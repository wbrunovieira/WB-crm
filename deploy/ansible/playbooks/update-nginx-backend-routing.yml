---
# Atualiza o Nginx para rotear caminhos de webhook/tracking/SSE diretamente ao NestJS (porta 3010),
# eliminando os proxies no Next.js e permitindo deletar src/app/api/{evolution,goto,track,webhooks}/.
#
# Uso: ansible-playbook -i inventory/production.yml playbooks/update-nginx-backend-routing.yml

- name: Update Nginx to route backend paths directly to NestJS
  hosts: webservers
  become: true
  vars:
    domain: crm.wbdigitalsolutions.com
    nextjs_port: 3000
    nestjs_port: 3010

  tasks:
    - name: Write updated Nginx config with NestJS direct routing
      copy:
        dest: /etc/nginx/sites-available/wb-crm.conf
        content: |
          server {
              listen 80;
              server_name {{ domain }};
              return 301 https://$server_name$request_uri;
          }

          server {
              listen 443 ssl http2;
              server_name {{ domain }};

              ssl_certificate /etc/letsencrypt/live/{{ domain }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ domain }}/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers off;

              # ── NestJS direct: WhatsApp webhook (Evolution API) ───────────────
              location = /api/evolution/webhook {
                  proxy_pass http://127.0.0.1:{{ nestjs_port }}/webhooks/whatsapp;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header X-Webhook-Secret $http_x_webhook_secret;
              }

              # ── NestJS direct: GoTo webhook ───────────────────────────────────
              location = /api/goto/webhook {
                  proxy_pass http://127.0.0.1:{{ nestjs_port }}/webhooks/goto/calls$is_args$args;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # ── NestJS direct: GoTo sync trigger ─────────────────────────────
              location = /api/goto/sync {
                  proxy_pass http://127.0.0.1:{{ nestjs_port }}/webhooks/goto/sync$is_args$args;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # ── NestJS direct: lead research webhook ──────────────────────────
              location = /api/webhooks/lead-research {
                  proxy_pass http://127.0.0.1:{{ nestjs_port }}/webhooks/lead-research;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # ── NestJS direct: email tracking pixel ──────────────────────────
              location ^~ /api/track/ {
                  rewrite ^/api/track/(.*)$ /track/$1 break;
                  proxy_pass http://127.0.0.1:{{ nestjs_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # ── Next.js: everything else (incl. /api/notifications/stream — needs session auth) ──
              location / {
                  proxy_pass http://127.0.0.1:{{ nextjs_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    - name: Test Nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
      when: nginx_test.rc == 0

    - name: Show result
      debug:
        msg: "Nginx updated — webhook/track/notifications paths now route directly to NestJS :{{ nestjs_port }}"
