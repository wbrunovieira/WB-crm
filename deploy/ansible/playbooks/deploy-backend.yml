---
# Deploy Backend NestJS
#
# O que faz:
#   1. Git pull no servidor
#   2. docker compose build + up --profile backend
#   3. Health check em /health
#
# CRM Next.js NÃO é afetado — roda em PM2 independente.
#
# Uso:
#   ansible-playbook -i inventory/production.yml playbooks/deploy-backend.yml

- name: Deploy NestJS Backend
  hosts: crm_server
  gather_facts: no

  vars:
    app_dir: /opt/wb-crm
    backend_port: 3010
    backend_domain: api.crm.wbdigitalsolutions.com
    github_branch: main

  tasks:
    # ── 1. Código ──────────────────────────────────────────────────────────────

    - name: Git pull
      raw: |
        cd {{ app_dir }} && \
        git fetch origin {{ github_branch }} && \
        git reset --hard origin/{{ github_branch }} && \
        git log -1 --oneline
      register: git_result

    - name: Commit deployado
      debug:
        msg: "{{ git_result.stdout_lines | last }}"

    # ── 2. Docker build + up ───────────────────────────────────────────────────

    - name: Verificar Docker
      raw: docker --version
      register: docker_check
      failed_when: docker_check.rc != 0

    - name: Build da imagem do backend
      raw: cd {{ app_dir }} && docker compose --profile backend build backend
      register: docker_build
      timeout: 600

    - name: Mostrar output do build
      debug:
        msg: "{{ docker_build.stdout_lines | last }}"

    - name: Remover containers parados com nome conflitante
      raw: |
        docker ps -a --filter "name=wb-crm-backend" --filter "status=exited" -q | xargs -r docker rm -f
        docker ps -a --filter "name=wb-crm-backend" --filter "status=created" -q | xargs -r docker rm -f
      ignore_errors: yes

    - name: Subir container do backend
      raw: cd {{ app_dir }} && docker compose --profile backend up -d --force-recreate backend
      register: docker_up

    # ── 3. Health check ────────────────────────────────────────────────────────

    - name: Aguardar backend inicializar (até 30s)
      raw: |
        for i in $(seq 1 6); do
          result=$(curl -sf http://localhost:{{ backend_port }}/health 2>/dev/null)
          if echo "$result" | grep -q '"ok":true'; then
            echo "HEALTHY: $result"
            exit 0
          fi
          sleep 5
        done
        echo "NOT_READY"
        exit 1
      register: health_check

    - name: Status dos containers
      raw: cd {{ app_dir }} && docker compose --profile backend ps
      register: docker_status

    - name: Resultado do deploy
      debug:
        msg: |
          ✅ BACKEND DEPLOY CONCLUÍDO
          ===========================
          Commit   : {{ git_result.stdout_lines | last }}
          Health   : {{ health_check.stdout | trim }}
          URL      : https://{{ backend_domain }}/health
          Containers:
          {{ docker_status.stdout }}
