---
# Deploy Backend NestJS
#
# O que faz:
#   1. Git pull no servidor
#   2. docker compose build --profile backend
#   3. Backup do DB + prisma migrate deploy (backend é a autoridade de migração)
#   4. up --profile backend
#   5. Health check em /health
#
# CRM Next.js NÃO é afetado — roda em PM2 independente.
# As migrações Prisma rodam AQUI (a partir do backend/prisma), não mais pelo frontend.
#
# Uso:
#   ansible-playbook -i inventory/production.yml playbooks/deploy-backend.yml

- name: Deploy NestJS Backend
  hosts: crm_server
  gather_facts: no

  vars:
    app_dir: /opt/wb-crm
    backend_port: 3010
    backend_domain: api.crm.wbdigitalsolutions.com
    github_branch: main
    backup_script: /opt/backups/backup-crm.sh

  tasks:
    # ── 1. Código ──────────────────────────────────────────────────────────────

    - name: Git pull
      raw: |
        cd {{ app_dir }} && \
        git fetch origin {{ github_branch }} && \
        git reset --hard origin/{{ github_branch }} && \
        git log -1 --oneline
      register: git_result

    - name: Commit deployado
      debug:
        msg: "{{ git_result.stdout_lines | last }}"

    # ── 2. Docker build + up ───────────────────────────────────────────────────

    - name: Verificar Docker
      raw: docker --version
      register: docker_check
      failed_when: docker_check.rc != 0

    - name: Build da imagem do backend
      raw: cd {{ app_dir }} && docker compose --profile backend build backend
      register: docker_build
      timeout: 600

    - name: Mostrar output do build
      debug:
        msg: "{{ docker_build.stdout_lines | last }}"

    # ── 2b. Migração do banco (backend = autoridade de migração) ───────────────
    # Roda ANTES de trocar o container ativo: backup → migrate deploy com a imagem
    # nova (usa env_file + rede do serviço via `compose run`). Se a migração falhar,
    # o play aborta e o container antigo continua servindo.

    - name: Backup do banco antes da migração (Google Drive via backup-crm.sh)
      # sudo: o script usa o rclone config do root (Google Drive). Sudoers escopado
      # do usuário `deploy` (CD) permite exatamente este script; como root é no-op.
      raw: sudo {{ backup_script }} 2>&1
      register: backup_result

    - name: Verificar backup
      fail:
        msg: |
          ❌ Backup falhou — abortando antes de migrar.
          {{ backup_result.stdout }}
      when: backup_result.rc != 0

    - name: Aplicar migrações Prisma (prisma migrate deploy)
      raw: cd {{ app_dir }} && docker compose --profile backend run --rm backend npx prisma migrate deploy 2>&1
      register: migrate_result

    - name: Resultado da migração
      debug:
        msg: "{{ migrate_result.stdout_lines | default(['(sem saída)']) | join('\n') }}"

    - name: Abortar se a migração falhou
      fail:
        msg: |
          ❌ Migração falhou. Container antigo segue ativo. Restaure o backup se necessário.
          {{ migrate_result.stdout }}
      when: migrate_result.rc != 0

    - name: Remover container existente (qualquer estado)
      raw: docker rm -f wb-crm-backend 2>/dev/null || true
      ignore_errors: yes

    - name: Subir container do backend
      raw: cd {{ app_dir }} && docker compose --profile backend up -d --force-recreate backend
      register: docker_up

    # ── 3. Health check ────────────────────────────────────────────────────────

    - name: Aguardar backend inicializar (até 120s — boot frio do NestJS)
      raw: |
        for i in $(seq 1 24); do
          result=$(curl -sf http://localhost:{{ backend_port }}/health 2>/dev/null)
          if echo "$result" | grep -q '"ok":true'; then
            echo "HEALTHY: $result"
            exit 0
          fi
          sleep 5
        done
        echo "NOT_READY"
        exit 1
      register: health_check

    - name: Status dos containers
      raw: cd {{ app_dir }} && docker compose --profile backend ps
      register: docker_status

    - name: Resultado do deploy
      debug:
        msg: |
          ✅ BACKEND DEPLOY CONCLUÍDO
          ===========================
          Commit   : {{ git_result.stdout_lines | last }}
          Health   : {{ health_check.stdout | trim }}
          URL      : https://{{ backend_domain }}/health
          Containers:
          {{ docker_status.stdout }}
