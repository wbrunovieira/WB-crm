services:
  # ── Desenvolvimento local ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wb-crm-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5499:5432"
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_DB: crm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend NestJS ──────────────────────────────────────────────────────────
  # Desenvolvimento local : docker compose --profile backend up -d
  # Produção              : docker compose --profile backend up -d
  #                         (usa rede externa crm-db_default para alcançar crm_postgres)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wb-crm-backend
    restart: unless-stopped
    ports:
      # Bind to localhost only — nginx (crm-api.wbdigitalsolutions.com) proxies to it.
      # Publishing on 0.0.0.0 would expose the API directly to the internet, bypassing
      # nginx (Docker port publishing also bypasses UFW).
      - "127.0.0.1:3010:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      ENV_FILE_PATH: /app/backend.env
      # Em desenvolvimento local o postgres sobe junto (service "postgres" acima).
      # Em produção o DATABASE_URL vem do backend/.env apontando para crm_postgres.
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/.env:/app/backend.env   # persiste tokens OAuth (GoTo etc.) entre reinicializações
    networks:
      - default        # rede interna do compose (desenvolvimento)
      - crm-db         # rede externa onde vive crm_postgres em produção
      - evolution      # rede da Evolution API (WhatsApp)
    profiles:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
  crm-db:
    external: true
    name: crm-db_default
  evolution:
    external: true
    name: evolution_evolution_network
