services:
  postgres:
    image: postgres:15-alpine
    container_name: wb-crm-postgres
    restart: unless-stopped
    ports:
      - "5499:5432"
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_DB: crm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wb-crm-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://crm_user:dev_password_123@postgres:5432/crm_db
      PORT: 3001
      # Copie as demais variáveis do .env (JWT_SECRET, EVOLUTION_API_URL, etc.)
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    profiles:
      - backend

volumes:
  postgres_data:
